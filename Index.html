<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0d18">
<title>8 Mart - Beynəlxalq Qadınlar Günü</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #e8536a;
    --blush: #f2a7b3;
    --cream: #fdf6f0;
    --gold: #c9a96e;
    --deep: #2a1a22;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    min-height: 100dvh;
  }

  body {
    background: var(--deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
    padding: 16px;
  }

  .bg-canvas {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #3d1a2e 0%, #1a0d18 50%, #0d0810 100%);
    overflow: hidden;
    z-index: 0;
  }

  .petal {
    position: absolute;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    animation: pulse 6s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
  }
  .orb1 { width: min(60vw, 400px); height: min(60vw, 400px); top: -10vh; left: -10vw; background: rgba(232,83,106,0.18); }
  .orb2 { width: min(50vw, 350px); height: min(50vw, 350px); bottom: -10vh; right: -10vw; background: rgba(201,169,110,0.14); animation-delay: 2s; }
  .orb3 { width: min(40vw, 260px); height: min(40vw, 260px); top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(242,167,179,0.09); animation-delay: 1s; }

  @keyframes pulse {
    from { opacity: 0.5; transform: scale(1); }
    to   { opacity: 1;   transform: scale(1.15); }
  }

  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 520px;
    background: linear-gradient(145deg, rgba(253,246,240,0.07) 0%, rgba(253,246,240,0.02) 100%);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 6px;
    padding: clamp(28px, 7vw, 60px) clamp(20px, 6vw, 50px) clamp(24px, 6vw, 50px);
    text-align: center;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 0 0 1px rgba(201,169,110,0.08), 0 24px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.07);
    animation: cardIn 1.2s cubic-bezier(0.16,1,0.3,1) both;
    margin: auto;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: clamp(30px, 8vw, 55px);
    height: clamp(30px, 8vw, 55px);
    border-color: rgba(201,169,110,0.4);
    border-style: solid;
  }
  .card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  .flower-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: clamp(14px, 3.5vw, 24px);
    animation: floatFlower 4s ease-in-out infinite;
  }
  @keyframes floatFlower {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-7px); }
  }
  .flower-svg { width: clamp(48px, 13vw, 72px); height: clamp(48px, 13vw, 72px); }

  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: clamp(6px, 2vw, 12px);
    margin-bottom: clamp(12px, 3vw, 20px);
    animation: fadeUp 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }
  .line { width: clamp(20px, 6vw, 40px); height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .line.right { background: linear-gradient(90deg, var(--gold), transparent); }
  .date-text {
    font-size: clamp(9px, 2.5vw, 13px);
    font-weight: 300;
    letter-spacing: clamp(2px, 0.8vw, 4px);
    text-transform: uppercase;
    color: var(--gold);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 11vw, 72px);
    font-weight: 400;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 6px;
    animation: fadeUp 1s 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: clamp(9px, 2.8vw, 14px);
    letter-spacing: clamp(2px, 1vw, 5px);
    text-transform: uppercase;
    color: rgba(201,169,110,0.7);
    margin-bottom: clamp(20px, 5vw, 36px);
    font-weight: 300;
    animation: fadeUp 1s 0.65s cubic-bezier(0.16,1,0.3,1) both;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: clamp(18px, 4.5vw, 32px);
    animation: fadeUp 1s 0.75s cubic-bezier(0.16,1,0.3,1) both;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3), transparent); }
  .diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

  .message {
    font-size: clamp(14px, 4vw, 17px);
    line-height: 1.9;
    color: rgba(253,246,240,0.75);
    font-weight: 300;
    font-style: italic;
    margin-bottom: clamp(20px, 5vw, 36px);
    animation: fadeUp 1s 0.85s cubic-bezier(0.16,1,0.3,1) both;
  }
  .message strong { color: var(--blush); font-style: normal; font-weight: 400; }

  .signature {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 5.5vw, 28px);
    font-style: italic;
    color: var(--rose);
    margin-bottom: clamp(18px, 4.5vw, 30px);
    animation: fadeUp 1s 1s cubic-bezier(0.16,1,0.3,1) both;
  }

  .flowers-row {
    display: flex;
    justify-content: center;
    gap: clamp(6px, 2vw, 10px);
    font-size: clamp(16px, 5vw, 22px);
    margin-bottom: clamp(16px, 4vw, 28px);
    animation: fadeUp 1s 1.1s cubic-bezier(0.16,1,0.3,1) both;
  }
  .flowers-row span { display: inline-block; animation: sway 3s ease-in-out infinite; }
  .flowers-row span:nth-child(1) { animation-delay: 0.0s; }
  .flowers-row span:nth-child(2) { animation-delay: 0.2s; }
  .flowers-row span:nth-child(3) { animation-delay: 0.4s; }
  .flowers-row span:nth-child(4) { animation-delay: 0.6s; }
  .flowers-row span:nth-child(5) { animation-delay: 0.8s; }
  @keyframes sway {
    0%,100% { transform: rotate(-8deg) scale(1); }
    50%      { transform: rotate(8deg) scale(1.15); }
  }

  .footer-text {
    font-size: clamp(9px, 2.5vw, 11px);
    letter-spacing: clamp(2px, 0.8vw, 3px);
    text-transform: uppercase;
    color: rgba(201,169,110,0.4);
    animation: fadeUp 1s 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sparkle {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--gold);
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0); }
    50%      { opacity: 1; transform: scale(1); }
  }

  @media (max-width: 380px) {
    .message br { display: none; }
  }
  @media (max-height: 600px) and (orientation: landscape) {
    body { align-items: flex-start; padding: 10px; }
    .flower-wrap { margin-bottom: 8px; }
  }
</style>
</head>
<body>

<div class="bg-canvas" id="bgCanvas"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="sparkle" style="top:18px;right:70px;animation-delay:0.5s"></div>
  <div class="sparkle" style="top:36px;left:55px;animation-delay:1.2s"></div>
  <div class="sparkle" style="bottom:70px;left:38px;animation-delay:0.8s"></div>
  <div class="sparkle" style="bottom:36px;right:48px;animation-delay:1.8s"></div>

  <div class="flower-wrap">
    <svg class="flower-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="36" cy="18" rx="8" ry="16" fill="#e8536a" opacity="0.9" transform="rotate(0 36 36)"/>
      <ellipse cx="36" cy="18" rx="8" ry="16" fill="#f2a7b3" opacity="0.7" transform="rotate(45 36 36)"/>
      <ellipse cx="36" cy="18" rx="8" ry="16" fill="#e8536a" opacity="0.9" transform="rotate(90 36 36)"/>
      <ellipse cx="36" cy="18" rx="8" ry="16" fill="#f2a7b3" opacity="0.7" transform="rotate(135 36 36)"/>
      <ellipse cx="36" cy="18" rx="8" ry="16" fill="#e8536a" opacity="0.9" transform="rotate(180 36 36)"/>
      <ellipse cx="36" cy="18" rx="8" ry="16" fill="#f2a7b3" opacity="0.7" transform="rotate(225 36 36)"/>
      <ellipse cx="36" cy="18" rx="8" ry="16" fill="#e8536a" opacity="0.9" transform="rotate(270 36 36)"/>
      <ellipse cx="36" cy="18" rx="8" ry="16" fill="#f2a7b3" opacity="0.7" transform="rotate(315 36 36)"/>
      <circle cx="36" cy="36" r="10" fill="#c9a96e"/>
      <circle cx="36" cy="36" r="6"  fill="#fdf6f0"/>
    </svg>
  </div>

  <div class="date-badge">
    <span class="line"></span>
    <span class="date-text">8 Mart 2025</span>
    <span class="line right"></span>
  </div>

  <h1>Bayramınız<br><em>Mübarək!</em></h1>
  <p class="subtitle">Beynəlxalq Qadınlar Günü</p>

  <div class="divider">
    <span class="divider-line"></span>
    <span class="diamond"></span>
    <span class="divider-line"></span>
  </div>

  <p class="message">
    Həyatımıza <strong>işıq, sevgi və gözəllik</strong> gətirən,<br>
    hər addımda güclü olan, hər gülüşü ilə<br>
    dünyamızı daha <strong>mənalı</strong> edən<br>
    bütün qadınlara sonsuz ehtiramla...
  </p>

  <div class="signature">Xoşbəxtlik sizinlə olsun</div>

  <div class="flowers-row">
    <span>🌸</span>
    <span>🌹</span>
    <span>💐</span>
    <span>🌺</span>
    <span>🌸</span>
  </div>

  <p class="footer-text">Sevgi · Güc · Zərafət</p>
</div>

<script>
  const canvas = document.getElementById('bgCanvas');
  const colors = ['#e8536a','#f2a7b3','#c9a96e','#fce4ec','#f48fb1'];
  const count = window.innerWidth < 480 ? 16 : 28;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 5 + Math.random() * 12;
    p.style.cssText = `width:${size}px;height:${size*1.4}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${7+Math.random()*8}s;animation-delay:${Math.random()*10}s;opacity:0;`;
    canvas.appendChild(p);
  }

  function spawnSparkle(x, y) {
    const s = document.createElement('div');
    s.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:5px;height:5px;background:#c9a96e;border-radius:50%;pointer-events:none;z-index:999;animation:sparkOut 0.7s forwards;`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }

  document.addEventListener('mousemove', (e) => { if (Math.random() > 0.85) spawnSparkle(e.clientX, e.clientY); });
  document.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (Math.random() > 0.6) spawnSparkle(t.clientX, t.clientY);
  }, { passive: true });

  const st = document.createElement('style');
  st.textContent = `@keyframes sparkOut { 0%{opacity:1;transform:scale(1) translateY(0)} 100%{opacity:0;transform:scale(0) translateY(-22px)} }`;
  document.head.appendChild(st);
</script>
</body>
</html>
